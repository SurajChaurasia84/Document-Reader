name: doc_reader
description: "Offline-first document reader, PDF toolkit, scanner, OCR, and AI tools."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  path: ^1.9.1
  sqflite: ^2.4.2
  file_picker: ^10.3.2
  permission_handler: ^12.0.1
  intl: ^0.20.2
  syncfusion_flutter_pdf: ^31.1.22
  pdfx: ^2.9.2
  google_mlkit_text_recognition: ^0.15.0
  camera: ^0.11.2
  edge_detection:
    path: third_party/edge_detection
  open_filex: ^4.7.0
  google_fonts: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
